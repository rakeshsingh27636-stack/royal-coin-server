<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Royal Coin Toss</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root { --gold-royal: #ffd700; --gold-dark: #b8860b; --burgundy-dark: #0a0001; --burgundy-light: #250006; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--burgundy-dark); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
    .mobile-app { width: 100%; max-width: 400px; height: 100vh; background: linear-gradient(180deg, #140002 0%, #050000 100%); padding: 15px 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 10; }
    #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    .header h1 { font-family: 'Orbitron', sans-serif; margin: 0; font-size: 26px; color: var(--gold-royal); text-align: center; }
    .top-balance-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 12px; border: 1px solid var(--gold-dark); }
    .balance-display { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--gold-royal); font-weight: bold; }
    .funds-nav-btn { background: linear-gradient(180deg, #fffde7 0%, #ffd700 40%, #b8860b 100%); color: #3a2700; padding: 6px 14px; border-radius: 8px; font-weight: 900; cursor: pointer; }
    .coin-container { display: flex; justify-content: center; align-items: center; flex-grow: 1; perspective: 1200px; }
    .coin { width: 150px; height: 150px; position: relative; transform-style: preserve-3d; border-radius: 50%; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
    .coin-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 32px; font-weight: 900; border: 10px solid #c59b00; box-sizing: border-box; }
    .coin-heads { background: #ffd700; color: #3a2700; transform: rotateY(0deg); }
    .coin-tails { background: #dcdcdc; color: #111; transform: rotateY(180deg); }
    .coin.flipping { animation: spinCoin 0.18s infinite linear; }
    @keyframes spinCoin { 0% { transform: rotateY(0deg) translateY(0); } 50% { transform: rotateY(180deg) translateY(-25px); } 100% { transform: rotateY(360deg) translateY(0); } }
    .coin-stop-heads { transform: rotateY(0deg); transition: transform 0.6s; }
    .coin-stop-tails { transform: rotateY(180deg); transition: transform 0.6s; }
    .result-panel { background: rgba(0,0,0,0.8); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 10px; text-align: center; color: var(--gold-royal); margin-bottom: 10px; font-family: 'Orbitron'; }
    .controls { background: rgba(0,0,0,0.9); border: 2px solid var(--gold-dark); border-radius: 18px; padding: 12px; }
    .wager-selector { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 6px 12px; border-radius: 10px; margin-bottom: 12px; }
    #wager-input { background: transparent; border: none; border-bottom: 2px dashed var(--gold-royal); color: var(--gold-royal); font-family: 'Orbitron'; font-size: 20px; font-weight: bold; width: 75px; text-align: center; outline: none; }
    .wager-btn { background: transparent; border: none; color: var(--gold-royal); font-size: 24px; cursor: pointer; }
    .side-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .side-btn { flex: 1; padding: 12px 0; background: #111; border: 2px solid var(--gold-dark); border-radius: 8px; color: var(--gold-royal); font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
    .side-btn.selected { background: var(--gold-royal); color: #000; }
    .action-btn { width: 100%; padding: 14px; border-radius: 8px; background: var(--gold-royal); color: #000; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
    .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .modal-card { width: 100%; background: #1a0003; border: 2px solid var(--gold-royal); border-radius: 20px; padding: 25px; text-align: center; }
    .login-input { padding: 12px; background: #000; border: 1px solid var(--gold-royal); color: var(--gold-royal); border-radius: 5px; width: 90%; margin: 10px auto; outline: none; display: block;}
    .hub-btn { padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; border: 1px solid #fff;}
    .deposit-btn { background: linear-gradient(90deg, #00b4db, #00ff99); color: #000; }
  </style>
</head>
<body>
  <div class="mobile-app">
    
    <div class="modal-overlay" id="login-screen" style="display:flex;">
      <div class="modal-card">
        <h2 style="color:gold; font-family:Orbitron;">ROYAL CASINO</h2>
        <input type="text" id="user-name" class="login-input" placeholder="Enter Nickname" />
        <input type="number" id="user-mobile" class="login-input" placeholder="Mobile Number" />
        <button class="hub-btn deposit-btn" onclick="startAppSession()">SECURE LOGIN</button>
      </div>
    </div>

    <div class="modal-overlay" id="fundsModal">
      <div class="modal-card" id="funds-main">
        <h2 style="color:gold; font-family:Orbitron;">ROYAL WALLET</h2>
        <button class="hub-btn deposit-btn" onclick="toggleModal('fundsModal', false); alert('Deposit UPI coming soon!')">📥 Add Funds</button>
        <button class="hub-btn" style="background:#ff3366; color:white;" onclick="toggleModal('fundsModal', false); alert('Withdrawal coming soon!')">📤 Withdraw</button>
        <hr style="border-color:#555; margin: 20px 0;">
        <input type="text" id="coupon-code-input" class="login-input" placeholder="Enter Coupon Code" style="text-transform: uppercase;" />
        <button class="hub-btn deposit-btn" onclick="submitCoupon()">🎁 REDEEM CODE</button>
        <div style="color:gold; margin-top:15px; cursor:pointer;" onclick="toggleModal('fundsModal', false)">Back to Game</div>
      </div>
    </div>

    <div class="top-balance-bar">
      <div><div class="account-label">Balance</div><div class="balance-display" id="balance-txt">₹0.00</div></div>
      <button class="funds-nav-btn" onclick="toggleModal('fundsModal', true)">💰 FUNDS</button>
    </div>

    <div class="coin-container"><div class="coin" id="coin-object"><div class="coin-face coin-heads">H</div><div class="coin-face coin-tails">T</div></div></div>
    <div class="result-panel" id="status-terminal">AWAITING PREDICTION...</div>

    <div class="controls">
      <div class="wager-selector">
        <button class="wager-btn" onclick="changeWager(-100)">-</button>
        <input type="number" id="wager-input" value="100" readonly/>
        <button class="wager-btn" onclick="changeWager(100)">+</button>
      </div>
      <div class="side-row">
        <button id="btn-heads" class="side-btn" onclick="selectSide('heads')">HEADS</button>
        <button id="btn-tails" class="side-btn" onclick="selectSide('tails')">TAILS</button>
      </div>
      <button class="action-btn" id="toss-button" onclick="startRoyalGame()">PLAY GLOBAL</button>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <script>
    const socket = io(); 
    let currentBalance = 0; let selectedWager = 100; let lockedSide = null;
    let userName = localStorage.getItem('royalUserName') || ""; 
    let userPhone = localStorage.getItem('royalUserPhone') || ""; 

    // Auto-reconnect safely
    socket.on('connect', () => { if(userName && userPhone) socket.emit('setUserData', { name: userName, phone: userPhone }); });

    window.onload = () => { if(userPhone) { document.getElementById("login-screen").style.display = "none"; } };

    function startAppSession() {
        userName = document.getElementById('user-name').value;
        userPhone = document.getElementById('user-mobile').value;
        if(!userName || !userPhone) return alert("Fill all fields!");
        localStorage.setItem('royalUserName', userName); localStorage.setItem('royalUserPhone', userPhone);
        document.getElementById("login-screen").style.display = "none";
        socket.emit('setUserData', { name: userName, phone: userPhone });
    }

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? "flex" : "none"; }

    function submitCoupon() {
        let code = document.getElementById("coupon-code-input").value.trim().toUpperCase();
        if(!code) return alert("Enter code!");
        let p = userPhone || localStorage.getItem('royalUserPhone');
        socket.emit('redeemCoupon', { code: code, phone: p, name: userName });
    }
    
    socket.on('couponResult', (data) => {
        alert(data.message);
        if(data.status === 'success') { document.getElementById("coupon-code-input").value = ""; toggleModal('fundsModal', false); }
    });

    function changeWager(val) { selectedWager += val; if(selectedWager < 100) selectedWager = 100; document.getElementById("wager-input").value = selectedWager; }
    function selectSide(side) { lockedSide = side; document.getElementById("btn-heads").classList.remove('selected'); document.getElementById("btn-tails").classList.remove('selected'); document.getElementById("btn-"+side).classList.add('selected'); document.getElementById("status-terminal").innerHTML = `LOCKED: ${side.toUpperCase()}`; }

    function startRoyalGame() {
        if(!lockedSide) return alert("Select side!"); if(selectedWager > currentBalance) return alert("Insufficient balance!");
        document.getElementById("toss-button").disabled = true;
        document.getElementById("status-terminal").innerHTML = "TOSSING...";
        let p = userPhone || localStorage.getItem('royalUserPhone');
        socket.emit('placeBet', { side: lockedSide, amount: selectedWager, phone: p, name: userName });
    }

    socket.on('updateBalance', (data) => { currentBalance = data.newBalance; document.getElementById("balance-txt").innerHTML = "₹" + currentBalance; });
    socket.on('error', (data) => { alert(data.message); document.getElementById("toss-button").disabled = false; });

    socket.on('matchmakingStarted', () => { document.getElementById("coin-object").className = "coin flipping"; });
    socket.on('gameResult', (data) => {
        const coin = document.getElementById("coin-object");
        coin.className = data.tossResult === 'heads' ? "coin coin-stop-heads" : "coin coin-stop-tails";
        setTimeout(() => {
            document.getElementById("status-terminal").innerHTML = `${data.status.toUpperCase()}! Result: ${data.tossResult.toUpperCase()}`;
            document.getElementById("toss-button").disabled = false;
        }, 600);
    });
  </script>
</body>
</html>
